function isInRange(y, m, s, e) {
  const v = y * 12 + m;
  const sv = s[0] * 12 + s[1];
  const ev = e[0] * 12 + e[1];
  return v >= sv && v <= ev;
}

  const [tab, setTab] = useState("angkor");

  const [expanded, setExpanded] = useState(null);
  const [editField, setEditField] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [showLog, setShowLog] = useState(false);
  // Changelog: array of { msId, msName, actName, field, from, to, time }
  const [changelog, setChangelog] = useState([]);
  const TEMPLATE_PHASES = {
    "Field work and sampling": [
      "Preparation & permission", "Core collection", "eDNA subsampling & pipeline",
      "Sediment description & catchment data"
    ],
    "Proxy data generation": [
      "CT scans of cores", "Geochronology", "XRF Scanning", "Discrete Lipid analyses",
      "Mass spectrometry imaging", "Hyperspectral imaging", "Isotope data",
      "Minerogenic input", "Chironomid analyses"
    ],
    "Molecular": [
      "DNA extraction & library prep", "DNA Sequencing", "Capture sequencing"
    ],
    "Bioinformatic": [
      "Basic taxonomical mapping", "Plant and animal eDNA", "Microbial eDNA", "Pathogen eDNA"
    ],
    "Synthesis": [
      "Project meeting", "Writing & interpretation", "Circulation of draft"
    ],
    "Submission": [
      "Initial submission & review", "First revision", "Second revision", "Final submission"
    ],
  };
  // Build initial selection: all activities selected
  const buildAllSelected = () => {
    const sel = {};
    Object.entries(TEMPLATE_PHASES).forEach(([phase, acts]) => { sel[phase] = [...acts]; });
    return sel;
  };
  const [newForm, setNewForm] = useState({ name:"", short:"", pi:"", ys:2026, ye:2029, selectedActs: buildAllSelected(), expandedPhase: null, customAct:"", editingAct: null });
  const scrollRef = useRef(null);
  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth() + 1;

  const isAllTab = tab === "__all";
  const isDash = tab === "__dash";
  const ms = (isAllTab || isDash) ? null : data.find(m => m.id === tab);
  const years = [];
  if (ms) { for (let y = ms.ys; y <= ms.ye; y++) years.push(y); }
  const totalMonths = years.length * 12;

  const createManuscript = () => {
    const prefix = newForm.short.replace(/[^A-Z]/gi,"").substring(0,3).toUpperCase() || "NW";
    const id = prefix.toLowerCase() + "_" + Date.now();
    const phases = [];
    Object.entries(newForm.selectedActs).forEach(([phaseName, acts]) => {
      if (acts.length === 0) return;
      const phaseCode = phaseName.charAt(0).toUpperCase();
      phases.push({
        name: phaseName,
        acts: acts.map((actName, i) => ({
          id: `${prefix}-${phaseCode}${i+1}`,
          n: actName, lead: newForm.pi.split(" ")[0] || "", co: "", p: 0, exp: "",
          d: null, s: [newForm.ys, 1], e: [newForm.ys, 3]
        }))
      });
    });
    const newMs = {
      id, name: newForm.name || "New Manuscript", short: newForm.short || "New",
      pi: newForm.pi || "TBD", ys: newForm.ys, ye: newForm.ye, phases
    };
    setData(prev => [...prev, newMs]);
    setTab(id);
    setShowNew(false);
    setNewForm({ name:"", short:"", pi:"", ys:2026, ye:2029, selectedActs: buildAllSelected(), expandedPhase: null, customAct:"", editingAct: null });
  };

  const toggleActivity = (phaseName, actName) => {
    setNewForm(prev => {
      const cur = prev.selectedActs[phaseName] || [];
      const next = cur.includes(actName) ? cur.filter(a => a !== actName) : [...cur, actName];
      return { ...prev, selectedActs: { ...prev.selectedActs, [phaseName]: next } };
    });
  };

  const toggleAllInPhase = (phaseName) => {
    setNewForm(prev => {
      const all = TEMPLATE_PHASES[phaseName] || [];
      const cur = prev.selectedActs[phaseName] || [];
      const allSelected = all.every(a => cur.includes(a));
      return { ...prev, selectedActs: { ...prev.selectedActs, [phaseName]: allSelected ? [] : [...all] } };
    });
  };

  const renameActivity = (phaseName, oldName, newName) => {
    if (!newName.trim() || newName === oldName) return;
    setNewForm(prev => ({
      ...prev,
      selectedActs: {
        ...prev.selectedActs,
        [phaseName]: (prev.selectedActs[phaseName] || []).map(a => a === oldName ? newName.trim() : a)
      }
    }));
  };

  const removeActivity = (phaseName, actName) => {
    setNewForm(prev => ({
      ...prev,
      selectedActs: {
        ...prev.selectedActs,
        [phaseName]: (prev.selectedActs[phaseName] || []).filter(a => a !== actName)
      }
    }));
  };

  const moveActivity = (phaseName, idx, dir) => {
    setNewForm(prev => {
      const arr = [...(prev.selectedActs[phaseName] || [])];
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= arr.length) return prev;
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      return { ...prev, selectedActs: { ...prev.selectedActs, [phaseName]: arr } };
    });
  };

  const addCustomActivity = (phaseName) => {
    if (!newForm.customAct.trim()) return;
    setNewForm(prev => ({
      ...prev,
      selectedActs: { ...prev.selectedActs, [phaseName]: [...(prev.selectedActs[phaseName] || []), prev.customAct.trim()] },
      customAct: ""
    }));
  };

  const hasAnySelected = Object.values(newForm.selectedActs).some(acts => acts.length > 0);
  const totalSelected = Object.values(newForm.selectedActs).reduce((s, acts) => s + acts.length, 0);

  const deleteManuscript = (msId) => {
    setData(prev => prev.filter(m => m.id !== msId));
    if (tab === msId) setTab(data[0]?.id || "angkor");
  };

  const findAct = useCallback((id) => {
    for (const m of data) for (const p of m.phases) for (const a of p.acts) if (a.id === id) return a;
    return null;
  }, [data]);

  const updateAct = useCallback((id, updates) => {
    // Find current act + manuscript for logging
    let actObj = null, msObj = null;
    data.forEach(m => m.phases.forEach(p => p.acts.forEach(a => { if (a.id === id) { actObj = a; msObj = m; } })));
    if (actObj && msObj) {
      const entries = [];
      const fieldLabels = { p: "Progress", lead: "Lead", co: "Co-responsible", exp: "Expected", n: "Name" };
      Object.entries(updates).forEach(([key, val]) => {
        const oldVal = actObj[key];
        if (oldVal !== val && fieldLabels[key]) {
          entries.push({
            msId: msObj.id, msName: msObj.short || msObj.name,
            actName: actObj.n, field: fieldLabels[key],
            from: key === "p" ? oldVal + "%" : (oldVal || "—"),
            to: key === "p" ? val + "%" : (val || "—"),
            time: new Date().toISOString()
          });
        }
      });
      if (entries.length > 0) {
        setChangelog(prev => [...entries, ...prev].slice(0, 200));
      }
    }
    setData(prev => prev.map(m => ({
      ...m,
      phases: m.phases.map(p => ({
        ...p,
        acts: p.acts.map(a => a.id === id ? { ...a, ...updates } : a)
      }))
    })));
  }, [data]);

  const toggleMonth = useCallback((id, y, m) => {
    const act = findAct(id);
    if (!act) return;
    const inRange = isInRange(y, m, act.s, act.e);
    if (inRange) {
      // Shrink range
      const sv = act.s[0]*12+act.s[1], ev = act.e[0]*12+act.e[1], v = y*12+m;
      if (v === sv) updateAct(id, { s: [m===12?y+1:y, m===12?1:m+1] });
      else if (v === ev) updateAct(id, { e: [m===1?y-1:y, m===1?12:m-1] });
      // Can't remove from middle
    } else {
      // Extend range
      const v = y*12+m, sv = act.s[0]*12+act.s[1], ev = act.e[0]*12+act.e[1];
      if (v < sv) updateAct(id, { s: [y, m] });
      else if (v > ev) updateAct(id, { e: [y, m] });
    }
  }, [findAct, updateAct]);

  // Scroll to today on mount
  useEffect(() => {
    if (scrollRef.current && ms) {
      const todayIdx = (curY - ms.ys) * 12 + (curM - 1);
      const scrollTo = todayIdx * CW - 100;
      scrollRef.current.scrollLeft = Math.max(0, scrollTo);
    }
  }, [tab, ms?.ys, curY, curM]);

  const allActs = ms ? ms.phases.flatMap(p => p.acts) : data.flatMap(m => m.phases.flatMap(p => p.acts));
  const total = allActs.length;
  const done = allActs.filter(a => a.p === 100).length;
  const avg = total > 0 ? Math.round(allActs.reduce((s,a) => s + a.p, 0) / total) : 0;

  return (
    <div style={{ minHeight:"100vh", background:"#f8fafc", fontFamily:"'Söhne','DM Sans',-apple-system,sans-serif", color:"#0f172a", fontSize:11 }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{height:6px;width:4px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
        input:focus{outline:none;border-color:#0d9488!important}
        .edit-input{background:#ffffff;border:1px solid #e2e8f0;border-radius:4px;color:#1e293b;padding:2px 5px;font-size:10px;font-family:inherit;width:100%}
        .gcell{transition:opacity 0.1s}
        .gcell:hover{opacity:0.75;cursor:pointer}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:50;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .modal{background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;width:380px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
        .modal h2{font-size:16px;font-weight:700;margin-bottom:4px;color:#0f172a}
        .modal p{font-size:10px;color:#64748b;margin-bottom:16px}
        .field-label{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;margin-top:12px}
        .field-input{width:100%;padding:8px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;color:#1e293b;font-size:12px;font-family:inherit}
        .field-input:focus{border-color:#0d9488;outline:none}
        .phase-toggle{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;border:1px solid #e2e8f0;cursor:pointer;margin-bottom:4px;transition:all 0.15s;background:transparent}
        .phase-toggle:hover{border-color:#cbd5e1;background:#f8fafc}
        .phase-toggle.on{border-color:#0d9488;background:#f0fdfa}
        .btn-create{width:100%;padding:10px;font-size:12px;font-weight:700;background:linear-gradient(135deg,#0d9488,#2563eb);color:white;border:none;border-radius:8px;cursor:pointer;margin-top:16px;font-family:inherit;letter-spacing:0.3px}
        .btn-create:hover{opacity:0.9}
        .btn-create:disabled{opacity:0.3;cursor:not-allowed}
        .btn-cancel{width:100%;padding:8px;font-size:11px;font-weight:600;background:transparent;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;margin-top:8px;font-family:inherit}
        .btn-cancel:hover{border-color:#cbd5e1;color:#475569}
        select.field-input{appearance:auto}
      `}</style>

      {/* Header */}
      <div style={{ padding:"10px 14px", borderBottom:"1px solid #e2e8f0", display:"flex", alignItems:"center", gap:10, background:"#ffffff" }}>
        <div style={{ width:26, height:26, borderRadius:7, background:"linear-gradient(135deg,#14b8a6,#3b82f6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#ffffff" }}>T</div>
        <div>
          <div style={{ fontSize:13, fontWeight:700 }}>GeoGenetics Publication Timelines</div>
          <div style={{ fontSize:9, color:"#94a3b8" }}>Lead: Kurt H. Kjær &middot; {MOFULL[curM-1]} {curY}</div>
        </div>
        <div style={{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center", fontSize:9, color:"#94a3b8" }}>
          <span style={{ color:"#0d9488", fontWeight:700 }}>{avg}%</span>
          <span>{done}/{total} done</span>
          <button onClick={() => setShowLog(!showLog)}
            style={{ background: showLog ? "rgba(251,191,36,0.12)" : "#f1f5f9",
              border: showLog ? "1px solid rgba(251,191,36,0.3)" : "1px solid #e2e8f0",
              borderRadius:5, padding:"3px 8px", fontSize:9, fontWeight:600,
              color: showLog ? "#d97706" : "#94a3b8", cursor:"pointer", fontFamily:"inherit",
              display:"flex", alignItems:"center", gap:4 }}>
            {changelog.length > 0 && <span style={{ width:5, height:5, borderRadius:"50%", background:"#d97706" }} />}
            Log
          </button>
        </div>
      </div>

      {/* Changelog panel */}
      {showLog && (
        <div style={{ borderBottom:"1px solid #e2e8f0", maxHeight:220, overflowY:"auto", background:"#fffbeb" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 14px 4px" }}>
            <span style={{ fontSize:9, fontWeight:700, color:"#d97706", textTransform:"uppercase", letterSpacing:1 }}>
              Recent Changes
            </span>
            {changelog.length > 0 && (
              <button onClick={() => setChangelog([])}
                style={{ fontSize:8, color:"#94a3b8", background:"none", border:"none", cursor:"pointer", fontFamily:"inherit" }}>
                Clear
              </button>
            )}
          </div>
          {changelog.length === 0 ? (
            <div style={{ padding:"8px 14px 12px", fontSize:10, color:"#94a3b8" }}>
              No changes yet. Updates will appear here as team members edit timelines.
            </div>
          ) : (
            <div style={{ padding:"0 14px 8px" }}>
              {changelog.filter(c => isAllTab || c.msId === tab).slice(0, 50).map((entry, i) => {
                const time = new Date(entry.time);
                const timeStr = time.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
                const dateStr = time.toLocaleDateString([], { month:"short", day:"numeric" });
                return (
                  <div key={i} style={{ display:"flex", gap:8, padding:"4px 0", borderBottom:"1px solid #f8fafc", alignItems:"flex-start" }}>
                    <div style={{ fontSize:8, color:"#94a3b8", fontFamily:"'JetBrains Mono',monospace", flexShrink:0, width:70, paddingTop:1 }}>
                      {dateStr} {timeStr}
                    </div>
                    <div style={{ flex:1, fontSize:10 }}>
                      <span style={{ color:"#94a3b8", fontWeight:600 }}>{entry.msName}</span>
                      <span style={{ color:"#94a3b8" }}> &middot; </span>
                      <span style={{ color:"#334155" }}>{entry.actName}</span>
                      <div style={{ fontSize:9, color:"#94a3b8", marginTop:1 }}>
                        {entry.field}: <span style={{ color:"#94a3b8", textDecoration:"line-through" }}>{entry.from}</span>
                        <span style={{ color:"#94a3b8" }}> → </span>
                        <span style={{ color:"#0d9488" }}>{entry.to}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Tabs */}
      <div style={{ display:"flex", borderBottom:"1px solid #e2e8f0", overflowX:"auto" }}>
        <button onClick={() => { setTab("__all"); setExpanded(null); }}
          style={{ padding:"8px 12px", fontSize:10, fontWeight:700, color:tab==="__all"?"#d97706":"#94a3b8",
            background:"none", border:"none", borderBottom:tab==="__all"?"2px solid #fbbf24":"2px solid transparent",
            cursor:"pointer", whiteSpace:"nowrap", fontFamily:"inherit" }}>
          All
        </button>
        <button onClick={() => { setTab("__dash"); setExpanded(null); }}
          style={{ padding:"8px 12px", fontSize:10, fontWeight:700, color:tab==="__dash"?"#ec4899":"#94a3b8",
            background:"none", border:"none", borderBottom:tab==="__dash"?"2px solid #f472b6":"2px solid transparent",
            cursor:"pointer", whiteSpace:"nowrap", fontFamily:"inherit" }}>
          Writing Dashboard
        </button>
        <div style={{ width:1, background:"#0f172a", margin:"4px 2px" }} />
        {data.map(m => {
          const mAvg = Math.round(m.phases.flatMap(p=>p.acts).reduce((s,a)=>s+a.p,0) / m.phases.flatMap(p=>p.acts).length);
          return (
            <button key={m.id} onClick={() => { setTab(m.id); setExpanded(null); }}
              style={{ padding:"8px 12px", fontSize:10, fontWeight:600, color:m.id===tab?"#0d9488":"#94a3b8",
                background:"none", border:"none", borderBottom:m.id===tab?"2px solid #0d9488":"2px solid transparent",
                cursor:"pointer", whiteSpace:"nowrap", fontFamily:"inherit", position:"relative" }}>
              {m.short}
              <span style={{ marginLeft:5, fontSize:8, fontFamily:"'JetBrains Mono',monospace", color:m.id===tab?"#0d9488":"#94a3b8", opacity:0.7 }}>{mAvg}%</span>
            </button>
          );
        })}
        <button onClick={() => setShowNew(true)}
          style={{ padding:"8px 14px", fontSize:12, fontWeight:700, color:"#0d9488", background:"none",
            border:"none", borderBottom:"2px solid transparent", cursor:"pointer", fontFamily:"inherit",
            whiteSpace:"nowrap", opacity:0.7 }}
          title="Add new manuscript timeline">
          +
        </button>
      </div>

      {/* ALL OVERVIEW TAB */}
      {isAllTab && (
        <div style={{ padding:"14px 16px", overflowY:"auto" }}>
          {/* Global stats bar */}
          <div style={{ display:"flex", gap:8, marginBottom:16 }}>
            {[{v:data.length,l:"Manuscripts",c:"#60a5fa"},{v:avg+"%",l:"Avg Progress",c:"#0d9488"},{v:done,l:"Tasks Done",c:"#059669"},{v:total-done,l:"Remaining",c:"#94a3b8"}].map((s,i) => (
              <div key={i} style={{ flex:1, textAlign:"center", padding:"10px 6px", background:"#f1f5f9", border:"1px solid #e2e8f0", borderRadius:8 }}>
                <div style={{ fontSize:18, fontWeight:700, fontFamily:"'JetBrains Mono',monospace", color:s.c }}>{s.v}</div>
                <div style={{ fontSize:7.5, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.8, marginTop:2 }}>{s.l}</div>
              </div>
            ))}
          </div>

          {/* Per-manuscript cards */}
          {data.map(m => {
            const mActs = m.phases.flatMap(p => p.acts);
            const mTotal = mActs.length;
            const mDone = mActs.filter(a => a.p === 100).length;
            const mActive = mActs.filter(a => a.p > 0 && a.p < 100).length;
            const mAvg = mTotal > 0 ? Math.round(mActs.reduce((s,a) => s + a.p, 0) / mTotal) : 0;
            // Find next upcoming deadline
            const upcoming = mActs.filter(a => a.exp && a.exp !== "Done" && a.exp !== "?" && a.exp !== "")
              .sort((a,b) => a.exp.localeCompare(b.exp));
            const nextDeadline = upcoming[0];
            // Find overdue (expected date < today and not done)
            const todayStr = `${curY}-${String(curM).padStart(2,"0")}`;
            const overdue = mActs.filter(a => a.exp && a.exp !== "Done" && a.exp !== "?" && a.exp !== "" && a.exp < todayStr && a.p < 100);

            return (
              <div key={m.id} style={{ marginBottom:10, background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, overflow:"hidden" }}>
                {/* Card header */}
                <div style={{ display:"flex", alignItems:"center", padding:"10px 12px", gap:10, cursor:"pointer", borderBottom:"1px solid #f1f5f9" }}
                  onClick={() => { setTab(m.id); setExpanded(null); }}>
                  <div>
                    <div style={{ fontSize:12, fontWeight:700 }}>{m.name}</div>
                    <div style={{ fontSize:9, color:"#94a3b8" }}>PI: {m.pi} &middot; {m.ys}–{m.ye}</div>
                  </div>
                  <div style={{ marginLeft:"auto", textAlign:"right" }}>
                    <div style={{ fontSize:18, fontWeight:700, fontFamily:"'JetBrains Mono',monospace", color:"#0d9488" }}>{mAvg}%</div>
                  </div>
                </div>

                {/* Progress bar */}
                <div style={{ height:4, background:"#f1f5f9" }}>
                  <div style={{ height:"100%", width:`${mAvg}%`, background:"linear-gradient(90deg,#0d948899,#0d9488)", borderRadius:2, transition:"width 0.4s" }} />
                </div>

                {/* Stats row */}
                <div style={{ display:"flex", padding:"8px 12px", gap:12, fontSize:9, color:"#94a3b8" }}>
                  <span><span style={{ color:"#059669", fontWeight:700 }}>{mDone}</span> done</span>
                  <span><span style={{ color:"#d97706", fontWeight:700 }}>{mActive}</span> active</span>
                  <span><span style={{ color:"#94a3b8", fontWeight:700 }}>{mTotal - mDone - mActive}</span> pending</span>
                  {overdue.length > 0 && <span style={{ color:"#ef4444" }}>{overdue.length} overdue</span>}
                </div>

                {/* Phase mini bars */}
                <div style={{ padding:"0 12px 10px", display:"flex", gap:4, flexWrap:"wrap" }}>
                  {m.phases.map((phase, pi) => {
                    const c = PC[phase.name] || PC["Synthesis"];
                    const phActs = phase.acts;
                    const phAvg = phActs.length > 0 ? Math.round(phActs.reduce((s,a)=>s+a.p,0)/phActs.length) : 0;
                    const phDone = phActs.filter(a=>a.p===100).length;
                    return (
                      <div key={pi} style={{ flex:"1 1 auto", minWidth:80, padding:"5px 8px", background:"#f8fafc",
                        border:`1px solid ${c.bar}22`, borderRadius:6 }}>
                        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:3 }}>
                          <span style={{ fontSize:7, fontWeight:700, color:c.accent, textTransform:"uppercase", letterSpacing:0.5 }}>{phase.name.split(" ")[0]}</span>
                          <span style={{ fontSize:8, fontFamily:"'JetBrains Mono',monospace", color:c.bar, fontWeight:600 }}>{phDone}/{phActs.length}</span>
                        </div>
                        <div style={{ height:3, background:"#f1f5f9", borderRadius:2, overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${phAvg}%`, background:c.bar, borderRadius:2, transition:"width 0.3s" }} />
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Upcoming deadlines */}
                {nextDeadline && (
                  <div style={{ padding:"0 12px 8px", fontSize:9, color:"#94a3b8" }}>
                    Next: <span style={{ color:"#334155" }}>{nextDeadline.n}</span>
                    <span style={{ marginLeft:4, fontFamily:"'JetBrains Mono',monospace", color: nextDeadline.exp < todayStr ? "#ef4444" : "#d97706" }}>{nextDeadline.exp}</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* WRITING DASHBOARD — Pipeline overview across all manuscripts */}
      {isDash && (() => {
        const msColors = ["#6b7280","#2563eb","#16a34a","#f59e0b","#ec4899","#7c3aed","#0d9488","#dc2626","#c026d3","#ea580c"];
        const globalYs = Math.min(...data.map(m => m.ys));
        const globalYe = Math.max(...data.map(m => m.ye));
        const dashYears = [];
        for (let y = globalYs; y <= globalYe; y++) dashYears.push(y);
        const dashTotalMonths = dashYears.length * 12;
        const dashCW = 24;
        const writingPhases = ["Synthesis", "Submission"];
        const activityRows = {};
        writingPhases.forEach(pName => {
          data.forEach(m => {
            m.phases.filter(p => p.name === pName).forEach(p => {
              p.acts.forEach(a => {
                const key = pName + "::" + a.n;
                if (!activityRows[key]) activityRows[key] = { phase: pName, name: a.n };
              });
            });
          });
        });
        const rowKeys = [...Object.keys(activityRows)];
        const dashTodayOff = (curY - globalYs) * 12 + (curM - 1);
        const dashTodayLeft = dashTodayOff * dashCW + dashCW / 2;

        return (
          <div>
            {/* Title bar */}
            <div style={{ padding:"8px 14px", borderBottom:"1px solid #e2e8f0", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#0f172a" }}>Writing Pipeline Overview</div>
              <div style={{ fontSize:9, color:"#94a3b8" }}>Synthesis &amp; Submission phases across all manuscripts</div>
            </div>

            <div style={{ display:"flex", overflow:"hidden" }}>
              {/* Fixed left: activity names */}
              <div style={{ flexShrink:0, borderRight:"2px solid #e2e8f0", background:"#ffffff", zIndex:5 }}>
              {/* Year header spacer */}
              <div style={{ height:20, borderBottom:"1px solid #e2e8f0" }} />
              <div style={{ height:16, borderBottom:"1px solid #e2e8f0" }} />
              {rowKeys.map((key, ri) => {
                const row = activityRows[key];
                const isPhaseStart = ri === 0 || activityRows[rowKeys[ri-1]]?.phase !== row.phase;
                return (
                  <div key={key}>
                    {isPhaseStart && (
                      <div style={{ display:"flex", alignItems:"center", gap:4, height:18, padding:"0 8px", background:"#f8fafc", borderBottom:"1px solid #f1f5f9" }}>
                        <div style={{ width:3, height:10, borderRadius:1, background: PC[row.phase]?.bar || "#d97706" }} />
                        <span style={{ fontSize:8, fontWeight:700, color: PC[row.phase]?.accent || "#fde68a", textTransform:"uppercase", letterSpacing:1 }}>{row.phase}</span>
                      </div>
                    )}
                    <div style={{ height:28, display:"flex", alignItems:"center", padding:"0 8px 0 16px", borderBottom:"1px solid #f1f5f9" }}>
                      <span style={{ fontSize:10, color:"#334155", whiteSpace:"nowrap" }}>{row.name}</span>
                    </div>
                  </div>
                );
              })}
              {/* Legend */}
              <div style={{ padding:"12px 8px 8px" }}>
                <div style={{ fontSize:8, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.8, marginBottom:6 }}>Legend</div>
                {data.map((m, mi) => (
                  <div key={m.id} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                    <div style={{ width:12, height:10, borderRadius:2, background:msColors[mi % msColors.length] }} />
                    <span style={{ fontSize:9, color:"#94a3b8" }}>{m.short || m.name}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Scrollable month grid */}
            <div style={{ flex:1, overflowX:"auto", overflowY:"hidden" }}>
              <div style={{ width:dashTotalMonths * dashCW, position:"relative" }}>
                {/* Year headers */}
                <div style={{ display:"flex", height:20, borderBottom:"1px solid #e2e8f0" }}>
                  {dashYears.map(y => (
                    <div key={y} style={{ width:12*dashCW, textAlign:"center", fontSize:10, fontWeight:700, color:"#94a3b8", lineHeight:"20px",
                      borderRight:"1px solid #e2e8f0" }}>{y}</div>
                  ))}
                </div>
                {/* Month numbers */}
                <div style={{ display:"flex", height:16, borderBottom:"1px solid #e2e8f0" }}>
                  {dashYears.map(y => Array.from({length:12}, (_,mi) => (
                    <div key={`${y}-${mi}`} style={{ width:dashCW, textAlign:"center", fontSize:8, color:"#94a3b8", lineHeight:"16px",
                      borderRight:mi===11?"1px solid #e2e8f0":"none" }}>{mi+1}</div>
                  )))}
                </div>

                {/* Activity rows with colored cells per manuscript */}
                {rowKeys.map((key, ri) => {
                  const row = activityRows[key];
                  const isPhaseStart = ri === 0 || activityRows[rowKeys[ri-1]]?.phase !== row.phase;
                  return (
                    <div key={key}>
                      {isPhaseStart && <div style={{ height:18, borderBottom:"1px solid #f1f5f9" }} />}
                      <div style={{ display:"flex", height:28, alignItems:"center", borderBottom:"1px solid #f1f5f9" }}>
                        {dashYears.map(y => Array.from({length:12}, (_,mi) => {
                          const m_month = mi + 1;
                          // Find which manuscripts have this activity in this month
                          const fills = data.map((manu, mIdx) => {
                            const phase = manu.phases.find(p => p.name === row.phase);
                            if (!phase) return null;
                            const act = phase.acts.find(a => a.n === row.name);
                            if (!act) return null;
                            if (isInRange(y, m_month, act.s, act.e)) return { color: msColors[mIdx % msColors.length], msName: manu.short };
                            return null;
                          }).filter(Boolean);

                          const titleParts = fills.map(f => f.msName);

                          return (
                            <div key={`${y}-${m_month}`}
                              title={`${MOFULL[mi]} ${y}${titleParts.length > 0 ? ": " + titleParts.join(", ") : ""}`}
                              style={{ width:dashCW, height:24, margin:"2px 0", display:"flex", gap:1,
                                borderRight:mi===11?"1px solid #f1f5f9":"none" }}>
                              {fills.map((f, ci) => (
                                <div key={ci} style={{ flex:1, borderRadius:2, background:f.color, opacity:1, margin:"0 1px",
                                  border:`1px solid ${f.color}44` }} />
                              ))}
                            </div>
                          );
                        }))}
                      </div>
                    </div>
                  );
                })}

                {/* Today line */}
                {dashTodayLeft > 0 && dashTodayLeft < dashTotalMonths * dashCW && (
                  <div style={{ position:"absolute", left:dashTodayLeft, top:0, bottom:0, width:2, background:"#dc2626", opacity:0.4, zIndex:3, pointerEvents:"none" }} />
                )}
              </div>
            </div>
          </div>
          </div>
        );
      })()}

      {/* Main spreadsheet area (individual manuscript view) */}
      {!isAllTab && !isDash && ms && (
      <div style={{ display:"flex", overflow:"hidden" }}>
        {/* Fixed left columns */}
        <div style={{ flexShrink:0, borderRight:"2px solid #e2e8f0", background:"#ffffff", zIndex:5 }}>
          {/* Header row */}
          <div style={{ display:"flex", height:20, borderBottom:"1px solid #e2e8f0" }}>
            <div style={{ width:140, padding:"2px 6px", fontSize:8, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.5 }}>Activity</div>
            <div style={{ width:60, padding:"2px 4px", fontSize:8, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", textAlign:"center" }}>Lead</div>
            <div style={{ width:55, padding:"2px 4px", fontSize:8, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", textAlign:"center" }}>Co-resp</div>
            <div style={{ width:32, padding:"2px 2px", fontSize:8, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", textAlign:"center" }}>%</div>
            <div style={{ width:52, padding:"2px 2px", fontSize:8, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", textAlign:"center" }}>Exp.</div>
          </div>
          {/* Phase + activity rows */}
          {ms.phases.map((phase, pi) => {
            const c = PC[phase.name] || PC["Synthesis"];
            return (
              <div key={pi}>
                {/* Phase header */}
                <div style={{ display:"flex", alignItems:"center", gap:4, height:20, padding:"0 6px", background:"#f8fafc", borderBottom:"1px solid #f1f5f9" }}>
                  <div style={{ width:3, height:10, borderRadius:1, background:c.bar }} />
                  <span style={{ fontSize:8, fontWeight:700, color:c.accent, textTransform:"uppercase", letterSpacing:1 }}>{phase.name}</span>
                </div>
                {/* Activities */}
                {phase.acts.map(act => {
                  const isExp = expanded === act.id;
                  const editing = editField?.id === act.id;
                  return (
                    <div key={act.id}>
                      <div style={{ display:"flex", height:RH, alignItems:"center", borderBottom:"1px solid #f1f5f9",
                        background:isExp?"#f1f5f9":"transparent", cursor:"pointer" }}
                        onClick={() => setExpanded(isExp ? null : act.id)}>
                        <div style={{ width:140, padding:"0 6px", fontSize:10, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                          color:act.p===100?"#94a3b8":"#334155", textDecoration:act.p===100?"line-through":"none", opacity:act.p===100?0.6:1 }}
                          title={act.n}>{act.n}</div>
                        <div onClick={e=>{e.stopPropagation();setEditField({id:act.id,field:"lead"})}} style={{ width:60, padding:"0 4px", fontSize:9, color:"#94a3b8", textAlign:"center", cursor:"text" }}>
                          {editing && editField.field==="lead" ?
                            <input className="edit-input" autoFocus defaultValue={act.lead}
                              onBlur={e=>{updateAct(act.id,{lead:e.target.value});setEditField(null)}}
                              onKeyDown={e=>{if(e.key==="Enter"){updateAct(act.id,{lead:e.target.value});setEditField(null)}}} />
                            : act.lead}
                        </div>
                        <div onClick={e=>{e.stopPropagation();setEditField({id:act.id,field:"co"})}} style={{ width:55, padding:"0 4px", fontSize:9, color:"#94a3b8", textAlign:"center", cursor:"text" }}>
                          {editing && editField.field==="co" ?
                            <input className="edit-input" autoFocus defaultValue={act.co}
                              onBlur={e=>{updateAct(act.id,{co:e.target.value});setEditField(null)}}
                              onKeyDown={e=>{if(e.key==="Enter"){updateAct(act.id,{co:e.target.value});setEditField(null)}}} />
                            : act.co || "—"}
                        </div>
                        <div onClick={e=>{e.stopPropagation();setEditField({id:act.id,field:"p"})}} style={{ width:32, padding:"0 2px", fontSize:9, fontWeight:600, textAlign:"center", cursor:"text",
                          fontFamily:"'JetBrains Mono',monospace", color:act.p===100?c.bar:act.p>0?"#334155":"#94a3b8" }}>
                          {editing && editField.field==="p" ?
                            <input className="edit-input" type="number" min={0} max={100} autoFocus defaultValue={act.p} style={{width:30,textAlign:"center"}}
                              onBlur={e=>{updateAct(act.id,{p:Math.max(0,Math.min(100,parseInt(e.target.value)||0))});setEditField(null)}}
                              onKeyDown={e=>{if(e.key==="Enter"){updateAct(act.id,{p:Math.max(0,Math.min(100,parseInt(e.target.value)||0))});setEditField(null)}}} />
                            : act.p}
                        </div>
                        <div onClick={e=>{e.stopPropagation();setEditField({id:act.id,field:"exp"})}} style={{ width:52, padding:"0 2px", fontSize:8, color:"#94a3b8", textAlign:"center", cursor:"text",
                          fontFamily:"'JetBrains Mono',monospace" }}>
                          {editing && editField.field==="exp" ?
                            <input className="edit-input" autoFocus defaultValue={act.exp} style={{width:50,fontSize:8}}
                              onBlur={e=>{updateAct(act.id,{exp:e.target.value});setEditField(null)}}
                              onKeyDown={e=>{if(e.key==="Enter"){updateAct(act.id,{exp:e.target.value});setEditField(null)}}} />
                            : act.exp || "—"}
                        </div>
                      </div>
                      {/* Expanded: quick progress buttons */}
                      {isExp && (
                        <div style={{ display:"flex", gap:3, padding:"4px 6px", background:"#f8fafc", borderBottom:"1px solid #f1f5f9" }}
                          onClick={e=>e.stopPropagation()}>
                          {[0,25,50,75,100].map(v => (
                            <button key={v} onClick={()=>updateAct(act.id,{p:v,...(v===100?{exp:"Done"}:{})})}
                              style={{ flex:1, padding:"3px 0", fontSize:9, fontWeight:700, borderRadius:4,
                                border:`1px solid ${act.p===v?"rgba(45,212,191,0.4)":"#0f172a"}`,
                                background:act.p===v?"rgba(45,212,191,0.12)":"transparent",
                                color:act.p===v?"#0d9488":"#94a3b8", cursor:"pointer", fontFamily:"'JetBrains Mono',monospace" }}>
                              {v===100?"\u2713":v+"%"}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>

        {/* Scrollable month grid */}
        <div ref={scrollRef} style={{ flex:1, overflowX:"auto", overflowY:"hidden" }}>
          <div style={{ width:totalMonths * CW, position:"relative" }}>
            {/* Year headers */}
            <div style={{ display:"flex", height:20, borderBottom:"1px solid #e2e8f0" }}>
              {years.map((y, yi) => (
                <div key={y} style={{ width:12*CW, display:"flex", flexShrink:0 }}>
                  {Array.from({length:12}, (_,mi) => {
                    const isJan = mi === 0;
                    return (
                      <div key={mi} style={{ width:CW, textAlign:"center", fontSize:mi===5?9:7, fontWeight:mi===5?700:400,
                        color:mi===5?"#94a3b8":"#94a3b8", borderRight:isJan?"1px solid #e2e8f0":"none",
                        lineHeight:"20px" }}>
                        {mi === 5 ? y : (mi===0?MO[mi]:MO[mi])}
                      </div>
                    );
                  })}
                </div>
              ))}
              {/* Today marker */}
              <div style={{ position:"absolute", left:((curY-ms.ys)*12+(curM-1))*CW + CW/2, top:0, bottom:0, width:2, background:"#dc2626", opacity:0.5, zIndex:10, pointerEvents:"none" }} />
            </div>

            {/* Phase + activity month cells */}
            {ms.phases.map((phase, pi) => {
              const c = PC[phase.name] || PC["Synthesis"];
              return (
                <div key={pi}>
                  {/* Phase header spacer */}
                  <div style={{ height:20, borderBottom:"1px solid #f1f5f9" }} />
                  {/* Activity month grids */}
                  {phase.acts.map(act => {
                    const isExp = expanded === act.id;
                    return (
                      <div key={act.id}>
                        <div style={{ display:"flex", height:RH, alignItems:"center", borderBottom:"1px solid #f1f5f9",
                          background:isExp?"#f1f5f9":"transparent" }}>
                          {years.map(y =>
                            Array.from({length:12}, (_,mi) => {
                              const m = mi + 1;
                              const filled = isInRange(y, m, act.s, act.e);
                              const isToday = y === curY && m === curM;
                              return (
                                <div key={`${y}-${m}`} className="gcell"
                                  onClick={(e) => { e.stopPropagation(); toggleMonth(act.id, y, m); }}
                                  title={`${MOFULL[mi]} ${y}`}
                                  style={{ width:CW, height:RH-4, margin:"2px 0",
                                    background: filled ? c.cell : "transparent",
                                    borderLeft: filled ? `1px solid ${c.bar}22` : "1px solid transparent",
                                    borderRight: mi===11 ? "1px solid #f1f5f9" : "none",
                                    position:"relative",
                                  }}>
                                  {filled && <div style={{ position:"absolute", inset:2, borderRadius:2,
                                    background:`linear-gradient(180deg,${c.bar}66,${c.bar}33)`,
                                    border:`1px solid ${c.bar}88` }} />}
                                </div>
                              );
                            })
                          )}
                        </div>
                        {isExp && <div style={{ height:29, borderBottom:"1px solid #f1f5f9" }} />}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {/* Today line spanning full height */}
            <div style={{ position:"absolute", left:((curY-ms.ys)*12+(curM-1))*CW + CW/2, top:20, bottom:0, width:2, background:"#dc2626", opacity:0.35, zIndex:3, pointerEvents:"none" }} />
          </div>
        </div>
      </div>
      )}

      {/* New Manuscript Modal */}
      {showNew && (
        <div className="modal-overlay" onClick={() => setShowNew(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h2>New Manuscript Timeline</h2>
            <p>Create a timeline and pick exactly which activities you need for this publication.</p>

            <div className="field-label">Manuscript Name</div>
            <input className="field-input" placeholder="e.g. Greenland Ice Core Study"
              value={newForm.name} onChange={e => setNewForm(p => ({...p, name:e.target.value}))} />

            <div style={{ display:"flex", gap:10, marginTop:0 }}>
              <div style={{ flex:1 }}>
                <div className="field-label">Short Name (tab)</div>
                <input className="field-input" placeholder="e.g. Greenland"
                  value={newForm.short} onChange={e => setNewForm(p => ({...p, short:e.target.value}))} />
              </div>
              <div style={{ flex:1 }}>
                <div className="field-label">PI</div>
                <input className="field-input" placeholder="e.g. Kurt H. Kjær"
                  value={newForm.pi} onChange={e => setNewForm(p => ({...p, pi:e.target.value}))} />
              </div>
            </div>

            <div style={{ display:"flex", gap:10, marginTop:0 }}>
              <div style={{ flex:1 }}>
                <div className="field-label">Start Year</div>
                <select className="field-input" value={newForm.ys} onChange={e => setNewForm(p => ({...p, ys:parseInt(e.target.value)}))}>
                  {[2024,2025,2026,2027,2028,2029,2030].map(y => <option key={y} value={y}>{y}</option>)}
                </select>
              </div>
              <div style={{ flex:1 }}>
                <div className="field-label">End Year</div>
                <select className="field-input" value={newForm.ye} onChange={e => setNewForm(p => ({...p, ye:parseInt(e.target.value)}))}>
                  {[2025,2026,2027,2028,2029,2030,2031,2032].map(y => <option key={y} value={y}>{y}</option>)}
                </select>
              </div>
            </div>

            <div className="field-label" style={{marginTop:16}}>Phases & Activities</div>
            <p style={{marginBottom:8}}>Expand each phase to pick specific activities. You can also add custom ones.</p>
            <div style={{ fontSize:9, color:"#0d9488", marginBottom:8, fontFamily:"'JetBrains Mono',monospace" }}>
              {totalSelected} activities selected
            </div>

            {Object.entries(TEMPLATE_PHASES).map(([phaseName, templateActs]) => {
              const c = PC[phaseName] || PC["Synthesis"];
              const selected = newForm.selectedActs[phaseName] || [];
              const allOn = templateActs.every(a => selected.includes(a));
              const someOn = selected.length > 0;
              const isOpen = newForm.expandedPhase === phaseName;
              // Include any custom activities (ones not in template)
              const customActs = selected.filter(a => !templateActs.includes(a));
              const allAvailable = [...templateActs, ...customActs];

              return (
                <div key={phaseName} style={{ marginBottom:4, border:`1px solid ${someOn ? c.bar+"33" : "#0f172a"}`,
                  borderRadius:8, overflow:"hidden", transition:"all 0.15s" }}>
                  {/* Phase header row */}
                  <div style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px", cursor:"pointer",
                    background: someOn ? `${c.bg}33` : "transparent" }}
                    onClick={() => setNewForm(p => ({...p, expandedPhase: isOpen ? null : phaseName}))}>
                    {/* Select all checkbox */}
                    <div onClick={e => { e.stopPropagation(); toggleAllInPhase(phaseName); }}
                      style={{ width:14, height:14, borderRadius:4, border:`2px solid ${allOn?c.bar:someOn?c.bar+"88":"#334155"}`,
                        background:allOn?c.bar:someOn?c.bar+"44":"transparent", display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:9, color:"#ffffff", fontWeight:800, flexShrink:0, cursor:"pointer" }}>
                      {allOn ? "\u2713" : someOn ? "\u2013" : ""}
                    </div>
                    <div style={{ flex:1 }}>
                      <span style={{ fontSize:11, fontWeight:600, color:someOn?c.accent:"#94a3b8" }}>{phaseName}</span>
                      <span style={{ fontSize:8, color:"#94a3b8", marginLeft:6 }}>{selected.length} selected</span>
                    </div>
                    <span style={{ fontSize:10, color:"#94a3b8", transform:isOpen?"rotate(180deg)":"rotate(0)", transition:"transform 0.2s" }}>{"\u25BE"}</span>
                  </div>

                  {/* Expanded: individual activities */}
                  {isOpen && (
                    <div style={{ padding:"4px 10px 8px", borderTop:`1px solid ${c.bar}22` }}>
                      {/* Unselected template activities (available to add) */}
                      {templateActs.filter(a => !selected.includes(a)).length > 0 && (
                        <div style={{ marginBottom:6 }}>
                          <div style={{ fontSize:8, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.5, marginBottom:3 }}>Available</div>
                          {templateActs.filter(a => !selected.includes(a)).map(actName => (
                            <div key={actName} onClick={() => toggleActivity(phaseName, actName)}
                              style={{ display:"flex", alignItems:"center", gap:7, padding:"3px 2px", cursor:"pointer", borderRadius:4, opacity:0.6 }}
                              onMouseEnter={e => {e.currentTarget.style.opacity="1";e.currentTarget.style.background="#f1f5f9"}}
                              onMouseLeave={e => {e.currentTarget.style.opacity="0.6";e.currentTarget.style.background="transparent"}}>
                              <div style={{ width:12, height:12, borderRadius:3, border:"1.5px solid #cbd5e1", flexShrink:0 }} />
                              <span style={{ fontSize:10, color:"#94a3b8" }}>{actName}</span>
                              <span style={{ marginLeft:"auto", fontSize:8, color:c.bar, opacity:0.7 }}>+ add</span>
                            </div>
                          ))}
                        </div>
                      )}

                      {/* Selected activities (editable) */}
                      {selected.length > 0 && (
                        <div>
                          <div style={{ fontSize:8, color:"#94a3b8", textTransform:"uppercase", letterSpacing:0.5, marginBottom:3, marginTop:4 }}>
                            Selected ({selected.length})
                          </div>
                          {selected.map((actName, idx) => {
                            const isCustom = !templateActs.includes(actName);
                            const isEditing = newForm.editingAct === `${phaseName}::${actName}`;
                            return (
                              <div key={actName + idx}
                                style={{ display:"flex", alignItems:"center", gap:5, padding:"3px 2px", borderRadius:4,
                                  background:"#f8fafc", marginBottom:2 }}>
                                {/* Reorder arrows */}
                                <div style={{ display:"flex", flexDirection:"column", gap:0, flexShrink:0 }}>
                                  <button onClick={e => {e.stopPropagation(); moveActivity(phaseName, idx, -1)}}
                                    style={{ background:"none", border:"none", color:idx===0?"#0f172a":"#94a3b8", cursor:idx===0?"default":"pointer",
                                      fontSize:8, padding:0, lineHeight:1, fontFamily:"inherit" }}>{"\u25B4"}</button>
                                  <button onClick={e => {e.stopPropagation(); moveActivity(phaseName, idx, 1)}}
                                    style={{ background:"none", border:"none", color:idx===selected.length-1?"#0f172a":"#94a3b8",
                                      cursor:idx===selected.length-1?"default":"pointer", fontSize:8, padding:0, lineHeight:1, fontFamily:"inherit" }}>{"\u25BE"}</button>
                                </div>
                                {/* Checkbox */}
                                <div style={{ width:12, height:12, borderRadius:3, border:`1.5px solid ${c.bar}`, background:c.bar,
                                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, color:"#ffffff", fontWeight:800, flexShrink:0 }}>{"\u2713"}</div>
                                {/* Name — double click to rename */}
                                {isEditing ? (
                                  <input className="edit-input" autoFocus defaultValue={actName}
                                    style={{ flex:1, fontSize:10, padding:"2px 5px" }}
                                    onClick={e => e.stopPropagation()}
                                    onBlur={e => { renameActivity(phaseName, actName, e.target.value); setNewForm(p=>({...p,editingAct:null})); }}
                                    onKeyDown={e => { if(e.key==="Enter"){ renameActivity(phaseName, actName, e.target.value); setNewForm(p=>({...p,editingAct:null})); }
                                      if(e.key==="Escape") setNewForm(p=>({...p,editingAct:null})); }} />
                                ) : (
                                  <span onDoubleClick={e => { e.stopPropagation(); setNewForm(p=>({...p,editingAct:`${phaseName}::${actName}`})); }}
                                    style={{ flex:1, fontSize:10, color:"#334155", cursor:"text" }} title="Double-click to rename">
                                    {actName}
                                  </span>
                                )}
                                {isCustom && <span style={{ fontSize:6, color:c.bar, fontWeight:700, textTransform:"uppercase", letterSpacing:0.3 }}>custom</span>}
                                {/* Remove button */}
                                <button onClick={e => { e.stopPropagation(); removeActivity(phaseName, actName); }}
                                  style={{ background:"none", border:"none", color:"#94a3b8", cursor:"pointer", fontSize:12, padding:"0 2px",
                                    lineHeight:1, fontFamily:"inherit" }}
                                  onMouseEnter={e => e.currentTarget.style.color="#ef4444"}
                                  onMouseLeave={e => e.currentTarget.style.color="#94a3b8"}
                                  title="Remove activity">&times;</button>
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {/* Add custom activity */}
                      <div style={{ display:"flex", gap:4, marginTop:6, alignItems:"center" }}>
                        <input className="field-input" placeholder="Add custom activity..."
                          value={newForm.customAct}
                          style={{ flex:1, fontSize:10, padding:"4px 8px" }}
                          onClick={e => e.stopPropagation()}
                          onChange={e => setNewForm(p => ({...p, customAct:e.target.value}))}
                          onKeyDown={e => { if(e.key==="Enter") { e.preventDefault(); addCustomActivity(phaseName); }}} />
                        <button onClick={(e) => { e.stopPropagation(); addCustomActivity(phaseName); }}
                          style={{ padding:"4px 10px", fontSize:9, fontWeight:700, background:c.bar+"22", color:c.accent,
                            border:`1px solid ${c.bar}88`, borderRadius:4, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap" }}>
                          + Add
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

            <button className="btn-create" onClick={createManuscript}
              disabled={!newForm.name || !newForm.short || !hasAnySelected || newForm.ye <= newForm.ys}>
              Create Timeline ({totalSelected} activities)
            </button>
            <button className="btn-cancel" onClick={() => setShowNew(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

    function init() {
      ReactDOM.render(React.createElement(App), document.getElementById('root'));
    }
    try {
      if (typeof Office !== "undefined" && Office.onReady) {
        Office.onReady(function() { init(); });
      } else { throw new Error("No Office"); }
    } catch(e) {
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else { init(); }
    }
  </script>
</body>
</html>
